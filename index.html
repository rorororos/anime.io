<!DOCTYPE html>
<html lang="en">
<head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIME ARENA</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div id="main-menu">
        <div class="menu-container">
            <h1 class="game-title">ANIME ARENA</h1>
            <div class="menu-subtitle">Choose Your Destiny</div>
            <input type="text" id="player-name-input" placeholder="Enter your name..." maxlength="16">
            <button id="play-button">PLAY</button>
            <button id="sandbox-button">SANDBOX</button>
            <div class="menu-footer">WASD Move · Mouse Aim · Click Shoot · E Auto-fire</div>
        </div>
    </div>

    <canvas id="game-canvas"></canvas>

    <div id="hud" class="hidden">
        <div id="player-info">
            <div id="player-level">Level 1</div>
            <div id="player-route-info"></div>
        </div>

        <div id="hp-bar-container">
            <div id="hp-bar-fill"></div>
            <div id="hp-bar-text">100 / 100</div>
        </div>

        <div id="xp-bar-container">
            <div id="xp-bar-fill"></div>
            <div id="xp-bar-text">Level 1</div>
        </div>

        <div id="stats-panel" class="hidden">
            <div id="stats-title">Upgrade Stats <span id="stat-points-display">0</span></div>
            <div id="stats-list"></div>
        </div>

        <div id="score-display">
            <div id="score-text">Score: 0</div>
            <div id="kills-text">Kills: 0</div>
        </div>

        <div id="ability-bar" class="hidden"></div>

        <div id="kill-feed"></div>

        <div id="leaderboard">
            <div id="leaderboard-title">Leaderboard</div>
            <div id="leaderboard-list"></div>
        </div>

        <canvas id="minimap-canvas" width="200" height="200"></canvas>
    </div>

    <div id="route-overlay" class="hidden">
        <div class="route-overlay-content">
            <h2 class="route-title">CHOOSE YOUR PATH</h2>
            <div id="route-cards-container"></div>
        </div>
    </div>

    <div id="character-reveal" class="hidden">
        <div class="reveal-content">
            <div id="reveal-route-name"></div>
            <div id="reveal-character-name"></div>
            <div id="reveal-flash"></div>
        </div>
    </div>

    <div id="game-over" class="hidden">
        <div class="game-over-content">
            <h2>DEFEATED</h2>
            <div id="go-stats"></div>
            <button id="respawn-button">FIGHT AGAIN</button>
        </div>
    </div>

    <script src="src/constants.js"></script>
    <script src="src/utils.js"></script>
    <script src="src/ObjectPool.js"></script>
    <script src="src/SpatialGrid.js"></script>
    <script src="src/Camera.js"></script>
    <script src="src/InputManager.js"></script>
    <script src="src/Entity.js"></script>
    <script src="src/Particle.js"></script>
    <script src="src/VFXManager.js"></script>
    <script src="src/Projectile.js"></script>
    <script src="src/Shape.js"></script>
    <script src="src/AbilitySystem.js"></script>
    <script src="src/UpgradeSystem.js"></script>
    <script src="src/RouteSystem.js"></script>
    <script src="src/AbilityIcons.js"></script>
    <script src="src/SlashVFX.js"></script>
    <script src="src/WeaponSystem.js"></script>
    <script src="src/SoundSystem.js"></script>
    <script src="src/ImpactLines.js"></script>
    <script src="src/DamageVignette.js"></script>
    <script src="src/ComboSystem.js"></script>
    <script src="src/MapEvents.js"></script>
    <script src="src/BotBubbles.js"></script>
    <script src="src/AbilityData.js"></script>
    <script src="src/Player.js"></script>
    <script src="src/AIController.js"></script>
    <script src="src/Bot.js"></script>
    <script src="src/UIManager.js"></script>
    <script src="src/Minimap.js"></script>
    <script src="src/Leaderboard.js"></script>
    <script src="src/Game.js"></script>
    <script src="src/SandboxUI.js"></script>
        <script src="src/MobileControls.js"></script>
    <script src="src/main.js"></script>
    <script src="src/main.js"></script>
</body>
</html>
